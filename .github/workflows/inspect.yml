name: Linear Inspector

on:
  schedule:
    # 每周一 北京时间 10:00 = UTC 02:00（v2 周度体检）
    - cron: "0 2 * * 1"
  workflow_dispatch: {}  # 允许手动触发，方便测试

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run inspector
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LINEAR_TEAM_KEY: ${{ vars.LINEAR_TEAM_KEY }}
        run: python linear_inspector.py
